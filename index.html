<!DOCTYPE html>
<html lang="fr">
<head>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illusion</title>
     <link rel="icon" type="image/png" sizes="32x32" href="images/logo.PNG">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a0806; }
        #gc { display:block; width:100%; height:calc(100vh - 70px); cursor:crosshair; }

        #hud {
            position:fixed; bottom:0; left:0; right:0; height:70px;
            background:#1a1814; display:flex; align-items:center;
            justify-content:space-around; padding:0 16px; gap:12px; z-index:10;
            border-top:1px solid #333;
        }
         #jL, #jR { cursor:pointer; touch-action:none; border-radius:8px; background:#111; }

        #paramBar {
            position:fixed; top:10px; left:50%; transform:translateX(-50%);
            z-index:100; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
        }
        .pBtn {
            background:rgba(15,12,8,0.88); border:1px solid #4a3a20;
            border-radius:20px; padding:5px 14px; font-size:11px;
            letter-spacing:1px; color:#a08050; cursor:pointer;
            font-family:'Courier New',monospace; transition:all 0.2s;
            backdrop-filter:blur(4px); white-space:nowrap; user-select:none;
        }
        .pBtn:hover { border-color:#8a6030; color:#d4b060; }
        .pBtn.active { background:rgba(40,25,5,0.95); border-color:#c09040; color:#f0d080; }
        .pBtn .icon { margin-right:5px; }

        #toast {
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            background:#1a3a1a; color:#80e080; border:1px solid #3a8040;
            border-radius:20px; padding:6px 18px; font-size:11px;
            font-family:'Courier New',monospace; letter-spacing:1px;
            opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200;
        }
        #toast.show { opacity:1; }

     
        #coordPanel {
            display:none;
            position:fixed; top:10px; left:10px; z-index:100;
            background:rgba(15,12,8,0.88); border:1px solid #4a3a20;
            border-radius:8px; padding:8px 12px;
            font-family:'Courier New',monospace; font-size:12px;
            color:#d4b870; line-height:1.7;
            backdrop-filter:blur(4px); min-width:180px;
        }
        .coord-title { font-size:10px; letter-spacing:2px; color:#8a7040; text-transform:uppercase; margin-bottom:4px; }
        .coord-val { color:#f0d080; font-size:13px; font-weight:bold; }
        #copyBtn {
            margin-top:6px; width:100%; background:#2a1e08; border:1px solid #6a5020;
            color:#d4b060; font-size:10px; letter-spacing:1px; padding:4px 0;
            border-radius:4px; cursor:pointer; font-family:'Courier New',monospace;
            transition:all 0.2s;
        }
        #copyBtn:hover { background:#3a2e18; }
        #copyBtn.copied { background:#1a3a1a; color:#80d080; border-color:#3a8040; }

      
    </style>
</head>
<body>

    <canvas id="gc"></canvas>

    <div id="paramBar">
        <button class="pBtn" id="btnCoords" onclick="toggleCoords()"><span class="icon">📍</span>Coordinates</button>
       </div>

    <div id="coordPanel">
        <div class="coord-title">3D Position</div>
        <div>X : <span class="coord-val" id="cx">0.00</span></div>
        <div>Z : <span class="coord-val" id="cz">0.00</span></div>
        <div>Y : <span class="coord-val" id="cy">1.70</span></div>
        <button id="copyBtn" onclick="copyCoords()">⧉ COPY</button>
    </div>

   
    <div id="hud">
        <canvas id="jL" width="120" height="60"></canvas>
        <canvas id="jR" width="120" height="60"></canvas>
    </div>

   
    <div id="toast">✓ Sauvegardé</div>

   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        //  CHAMBRE AVEC PORTE INTERACTIVE (charnière gauche)
        //  Détection du paramètre from=corridor
        //  Position à (5.55, 1.7, 7.2) et regard vers -Z (intérieur)
        // ═══════════════════════════════════════════════════════════════

        if (typeof THREE === 'undefined') {
            document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Erreur : Three.js ne s\'est pas chargé.</h1>';
            throw new Error('THREE not loaded');
        }

        const canvas = document.getElementById('gc');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setClearColor(0x1a1410);
        renderer.setSize(window.innerWidth, window.innerHeight - 70);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1410, 20, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 70), 0.1, 60);

        // ─── Détection de provenance ────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const fromCorridor = urlParams.get('from') === 'corridor';

        let camYaw, camPitch;
if (fromCorridor) {
    camera.position.set(5.55, 1.7, 7.2);
    camYaw = Math.PI;
    camPitch = 0.1;
} else {
    camera.position.set(-7.01, 1.70, 0.69);
    camYaw = 0;
    camPitch = 0.1;
}

        // ─── Lumières ──────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x887868, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffe8c0, 0.9);
        sun.position.set(4, 10, 3);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.1;
        sun.shadow.camera.far = 20;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8899bb, 0.3);
        fill.position.set(-4, 2, -3);
        scene.add(fill);

        // ─── Textures ──────────────────────────────────────────────────
        function makeTex(fn, size) {
            size = size || 128;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            fn(ctx, size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        const stoneTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#b8a888';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < 60; i++) {
                const x = Math.random() * s,
                    y = Math.random() * s;
                const r = 180 + Math.random() * 40,
                    g = 160 + Math.random() * 30,
                    b = 130 + Math.random() * 30;
                ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                ctx.fillRect(x, y, 6 + Math.random() * 14, 6 + Math.random() * 12);
            }
            ctx.strokeStyle = 'rgba(80,70,55,0.12)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < s; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 128);
        stoneTex.repeat.set(3, 3);

        const floorTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#4a3828';
            ctx.fillRect(0, 0, s, s);
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 10; col++) {
                    const v = 70 + Math.random() * 30;
                    ctx.fillStyle = 'rgb(' + (v + 20) + ',' + (v - 10) + ',' + (v - 30) + ')';
                    ctx.fillRect(col * 12 + 1, row * 12 + 1, 10, 10);
                }
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= s; i += 12) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 120);
        floorTex.repeat.set(8, 8);
// Texture damier rouge (copiée du corridor)
const floorTexCorridor = makeTex(function(ctx, s) {
    ctx.fillStyle = '#2a0606';
    ctx.fillRect(0, 0, s, s);
    const cell = s / 4;
    for (let r = 0; r < 4; r++) {
        for (let col = 0; col < 4; col++) {
            const dark = (r + col) % 2 === 0;
            ctx.fillStyle = dark ? '#7a0f10' : '#160303';
            ctx.save();
            ctx.translate(col * cell + cell / 2, r * cell + cell / 2);
            ctx.rotate(Math.PI / 4);
            const d = cell * 0.62;
            ctx.fillRect(-d / 2, -d / 2, d, d);
            ctx.restore();
        }
    }
    ctx.strokeStyle = 'rgba(180,120,40,0.25)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i <= s; i += cell) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, s);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(s, i);
        ctx.stroke();
    }
}, 128);
floorTexCorridor.repeat.set(6, 6); // ajuste selon la taille de la moitié
        const woodTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#5a3a20';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < s; i += 3) {
                ctx.fillStyle = 'hsl(28,' + (25 + Math.random() * 15) + '%,' + (20 + Math.random() * 12) + '%)';
                ctx.fillRect(0, i, s, 2);
            }
        }, 64);
        woodTex.repeat.set(4, 4);

        // ─── Matériaux ──────────────────────────────────────────────────
        const mWall = new THREE.MeshLambertMaterial({ map: stoneTex, color: 0xddd0b8 });
        const mFloor = new THREE.MeshLambertMaterial({ map: floorTex, color: 0x6a5848 });
        const mWood = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x7a5a38 });
        const mGlass = new THREE.MeshLambertMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.2, side: THREE
                .DoubleSide });
        const mCeil = new THREE.MeshLambertMaterial({ color: 0xddd0c0 });
        const mDoor = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x6a4a30 });
        const mHandle = new THREE.MeshLambertMaterial({ color: 0xccaa88 });
        const mDoorFrame = new THREE.MeshLambertMaterial({ color: 0x4a3a2a });
        const mDoorHighlight = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x8a6a50, emissive: 0x442200,
            emissiveIntensity: 0.3 });

        // ─── Helpers ──────────────────────────────────────────────────
        function box(w, h, d, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        function plane(w, h, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            scene.add(m);
            return m;
        }

        function cylinder(rt, rb, h, seg, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.castShadow = true;
            scene.add(m);
            return m;
        }

        // ─── Dimensions ──────────────────────────────────────────────
        const WALL_H = 3.6;
        const ROOM_W = 16;
        const ROOM_D = 16;

       // ─── Deux demi‑sols (Z < 0 = damier, Z > 0 = d'origine) ─────
const floorMatOrig = new THREE.MeshLambertMaterial({ map: floorTex, color: 0x6a5848 });
const floorMatDamier = new THREE.MeshLambertMaterial({ map: floorTexCorridor, color: 0x8a4a4a });

// Moitié Z < 0 (côté du lit)
const halfDepth = ROOM_D / 2 + 0.1; // légèrement plus grand pour éviter les trous
const halfW = ROOM_W / 2 + 0.1;
const floorLeft = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W + 0.2, halfDepth), floorMatDamier);
floorLeft.rotation.x = -Math.PI / 2;
floorLeft.position.set(0, -0.01, -halfDepth/2);
floorLeft.receiveShadow = true;
scene.add(floorLeft);

// Moitié Z > 0 (autre côté)
const floorRight = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W + 0.2, halfDepth), floorMatOrig);
floorRight.rotation.x = -Math.PI / 2;
floorRight.position.set(0, -0.01, halfDepth/2);
floorRight.receiveShadow = true;
scene.add(floorRight);
        // ─── Murs (sauf avant) ──────────────────────────────────────
        plane(ROOM_W, WALL_H, mWall, 0, WALL_H / 2, -ROOM_D / 2, 0, 0);
        plane(ROOM_D, WALL_H, mWall, -ROOM_W / 2, WALL_H / 2, 0, 0, Math.PI / 2);
        plane(ROOM_D, WALL_H, mWall, ROOM_W / 2, WALL_H / 2, 0, 0, -Math.PI / 2);
// ═══════════════════════════════════════════════════════════════
//  MUR CENTRAL – PORTE INTÉRIEURE (version minimaliste)
// ═══════════════════════════════════════════════════════════════
(function() {
    const doorW = 1.2, doorH = 2.2;
    const doorZ = 0, doorX = 0;
    const wallThick = 0.3;

    // ── 1. Mur (double face) ──────────────────────────────────
    const wallMat = new THREE.MeshLambertMaterial({
        map: stoneTex,
        color: 0xddd0b8,
        side: THREE.DoubleSide
    });

    // Bloc gauche
    const leftW = -doorW/2 - (-ROOM_W/2);
    if (leftW > 0.01) {
        const leftBlock = new THREE.Mesh(new THREE.BoxGeometry(leftW, WALL_H, wallThick), wallMat);
        leftBlock.position.set((-ROOM_W/2 + (-doorW/2)) / 2, WALL_H/2, doorZ);
        leftBlock.castShadow = true; leftBlock.receiveShadow = true;
        scene.add(leftBlock);
    }
    // Bloc droite
    const rightW = ROOM_W/2 - doorW/2;
    if (rightW > 0.01) {
        const rightBlock = new THREE.Mesh(new THREE.BoxGeometry(rightW, WALL_H, wallThick), wallMat);
        rightBlock.position.set((doorW/2 + ROOM_W/2) / 2, WALL_H/2, doorZ);
        rightBlock.castShadow = true; rightBlock.receiveShadow = true;
        scene.add(rightBlock);
    }
    // Bloc au-dessus
    const topH = WALL_H - doorH;
    if (topH > 0.01) {
        const topBlock = new THREE.Mesh(new THREE.BoxGeometry(doorW * 1.6, topH, wallThick), wallMat);
        topBlock.position.set(doorX, (doorH + WALL_H) / 2, doorZ);
        topBlock.castShadow = true; topBlock.receiveShadow = true;
        scene.add(topBlock);
    }

    // ── 2. Cadre de porte (très fin, presque invisible) ──────
    const frameMat = new THREE.MeshStandardMaterial({
        color: 0xcccccc,
        metalness: 0.1,
        roughness: 0.6,
        side: THREE.DoubleSide
    });
    const fw = 0.04;
    // Montants
    const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(fw, doorH, 0.08), frameMat);
    leftFrame.position.set(-doorW/2 - 0.02, doorH/2, doorZ);
    leftFrame.castShadow = true; scene.add(leftFrame);
    const rightFrame = new THREE.Mesh(new THREE.BoxGeometry(fw, doorH, 0.08), frameMat);
    rightFrame.position.set(doorW/2 + 0.02, doorH/2, doorZ);
    rightFrame.castShadow = true; scene.add(rightFrame);
    const topFrame = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.08, 0.04, 0.08), frameMat);
    topFrame.position.set(doorX, doorH + 0.02, doorZ);
    topFrame.castShadow = true; scene.add(topFrame);
    const botFrame = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.08, 0.03, 0.08), frameMat);
    botFrame.position.set(doorX, 0.015, doorZ);
    botFrame.castShadow = true; scene.add(botFrame);

    // ── 3. Porte (bois clair, vitre simple) ──────────────────
    const doorMat = new THREE.MeshStandardMaterial({
        color: 0xf0ece8,
        roughness: 0.5,
        metalness: 0.05,
        side: THREE.DoubleSide
    });
    const doorMatHi = new THREE.MeshStandardMaterial({
        color: 0xf8f4f0,
        emissive: 0x443322,
        emissiveIntensity: 0.2,
        side: THREE.DoubleSide
    });
    const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xddddff,
        transparent: true,
        opacity: 0.3,
        roughness: 0.02,
        metalness: 0.0,
        side: THREE.DoubleSide
    });

    // Pivot
    const pivotMid = new THREE.Group();
    pivotMid.position.set(-doorW/2, doorH/2, doorZ);
    scene.add(pivotMid);

    const doorGroupMid = new THREE.Group();
    doorGroupMid.position.set(doorW/2, 0, 0);

    // Vantail
    const doorMeshMid = new THREE.Mesh(new THREE.BoxGeometry(doorW, doorH, 0.035), doorMat);
    doorMeshMid.position.set(0, 0, 0);
    doorMeshMid.castShadow = true; doorMeshMid.receiveShadow = true;
    doorGroupMid.add(doorMeshMid);

    // Vitre (simple, pas de croisillons)
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(doorW * 0.7, doorH * 0.7), glassMat);
    glass.position.set(0, 0, 0.02);
    doorGroupMid.add(glass);

    // ── 4. Poignée (des deux côtés) ──────────────────────────
    const hMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.9,
        roughness: 0.2
    });
    // Face avant
    const hFwd = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.14, 8), hMat);
    hFwd.rotation.z = Math.PI / 2;
    hFwd.position.set(0.32, -0.1, 0.04);
    hFwd.castShadow = true;
    doorGroupMid.add(hFwd);
    const hBaseFwd = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), hMat);
    hBaseFwd.position.set(0.38, -0.1, 0.04);
    hBaseFwd.castShadow = true;
    doorGroupMid.add(hBaseFwd);

    // Face arrière
    const hBwd = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.14, 8), hMat);
    hBwd.rotation.z = Math.PI / 2;
    hBwd.position.set(0.32, -0.1, -0.04);
    hBwd.castShadow = true;
    doorGroupMid.add(hBwd);
    const hBaseBwd = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), hMat);
    hBaseBwd.position.set(0.38, -0.1, -0.04);
    hBaseBwd.castShadow = true;
    doorGroupMid.add(hBaseBwd);

    // Zone cliquable
    const clickAreaMid = new THREE.Mesh(
        new THREE.PlaneGeometry(doorW * 1.2, doorH * 1.2),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide })
    );
    clickAreaMid.position.set(0, 0, 0.02);
    clickAreaMid.userData.isClickArea = true;
    doorGroupMid.add(clickAreaMid);

    pivotMid.add(doorGroupMid);

    // ── 5. Variables globales ──────────────────────────────────
    window._midDoorGroup = doorGroupMid;
    window._midDoorPivot = pivotMid;
    window._midDoorMesh = doorMeshMid;
    window._midDoorMat = doorMat;
    window._midDoorHighlightMat = doorMatHi;
    window._midDoorOpen = false;
    window._midDoorAnimating = false;

    // ── 6. Collision du vantail ───────────────────────────────
    window._midDoorCollision = {
        halfW: doorW / 2,
        halfH: doorH / 2,
        halfD: 0.035 / 2 + 0.05
    };

    // ── 7. Limites du mur pour la collision ────────────────────
    window._midWallLimits = {
        minX: -ROOM_W/2,
        maxX: ROOM_W/2,
        doorMinX: -doorW/2,
        doorMaxX: doorW/2,
        doorZ: doorZ,
        thickness: wallThick
    };

    console.log('🚪 Porte intérieure minimaliste (double face)');
})();
canvas.addEventListener('click', function(event) {
    // Porte extérieure : on affiche le monologue sans ouvrir la porte
    if (hoverDoor) {
        // On réinitialise l'état de la porte pour pouvoir recliquer après "No"
        window._doorOpen = false;
        window._doorAnimating = false;
        showMonologue();
    }
});


        // ─── Mur avant (z positif) avec fenêtre et porte ──────────
        (function() {
            const fw = 2.8, fh = 2.0;
            const doorW = 1.2, doorH = 2.2;
            const doorX = ROOM_W / 2 - 1.8;
            const fz = ROOM_D / 2 + 0.01;
            const yc = WALL_H / 2;

            // Découpage du mur
            const xMin = -ROOM_W / 2, xMax = ROOM_W / 2;
            const yMin = 0, yMax = WALL_H;

            box(-fw/2 - xMin, WALL_H, 0.05, mWall, (xMin + (-fw/2)) / 2, WALL_H/2, fz);
            const xGap1 = fw/2, xGap2 = doorX - doorW/2;
            if (xGap2 > xGap1) {
                const w = xGap2 - xGap1;
                box(w, WALL_H, 0.05, mWall, (xGap1 + xGap2)/2, WALL_H/2, fz);
            }
            box(xMax - (doorX + doorW/2), WALL_H, 0.05, mWall, (doorX + doorW/2 + xMax)/2, WALL_H/2, fz);

            const yTop = Math.max(yc + fh/2, doorH);
            if (yMax > yTop) {
                box(ROOM_W, yMax - yTop, 0.05, mWall, 0, (yTop + yMax)/2, fz);
            }
            const yBotFen = yc - fh/2;
            if (yBotFen > yMin) {
                box(fw, yBotFen - yMin, 0.05, mWall, 0, (yMin + yBotFen)/2, fz);
            }
            if (yTop > doorH) {
                box(doorW, yTop - doorH, 0.05, mWall, doorX, (doorH + yTop)/2, fz);
            }

            // Fenêtre
            const mGlass2 = new THREE.MeshLambertMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.35, side: THREE
                    .DoubleSide });
            plane(fw, fh, mGlass2, 0, yc, fz + 0.01);
            const frameMat = new THREE.MeshLambertMaterial({ color: 0x4a3828 });
            [
                [fw + 0.2, 0.06, 0, fh / 2],
                [fw + 0.2, 0.06, 0, -fh / 2],

//  CRÉATION DU LIT FÉMININ – PLUS LONG (E = 1.1) – LARGEUR ORIGINALE
//  POSITION : (-7, 0, -7.2)  rotation.y = Math.PI/2
// ═══════════════════════════════════════════════════════════════
function createBed() {
    const group = new THREE.Group();

    // ── RÈGLE ICI LA TAILLE ──
    const E = 1.1;   // ALLONGEMENT (longueur) : +1.1m (0.3 de plus qu'avant)
    const W = 0;     // PAS D'ÉLARGISSEMENT (largeur d'origine)

    // ── Textures ──
    function createPatternTexture(colors, stripeWidth, bgColor) {
        const c = document.createElement('canvas');
        c.width = 256;
        c.height = 256;
        const ctx = c.getContext('2d');
        ctx.fillStyle = bgColor || '#f0e0d0';
        ctx.fillRect(0, 0, 256, 256);
        ctx.save();
        ctx.translate(128, 128);
        ctx.rotate(0.4);
        for (let i = -300; i < 300; i += 20) {
            ctx.fillStyle = colors[i % colors.length];
            ctx.fillRect(i, -300, stripeWidth || 8, 600);
        }
        ctx.restore();
        for (let i = 0; i < 80; i++) {
            ctx.fillStyle = colors[(i + 3) % colors.length];
            ctx.beginPath();
            ctx.arc(20 + Math.random() * 216, 20 + Math.random() * 216, 6 + Math.random() * 8, 0, Math.PI * 2);
            ctx.fill();
        }
        const t = new THREE.CanvasTexture(c);
        t.wrapS = t.wrapT = THREE.RepeatWrapping;
        t.repeat.set(2, 2);
        return t;
    }

    const blanketColors = ['#e8a0b0', '#d08090', '#f0c0c8', '#c06070'];
    const blanketTex = createPatternTexture(blanketColors, 10, '#f5e0e0');

    // ── Cadre du lit ──
    const frameMat = new THREE.MeshLambertMaterial({ color: 0xd4b090 });
    const legMat = new THREE.MeshLambertMaterial({ color: 0xb09070 });

    // 1️⃣ Pieds (largeur = 0.6 de chaque côté, comme à l'origine)
    const halfW = 0.6 + W / 2;  // = 0.6
    const legs = [
        [-halfW, -0.8],
        [halfW, -0.8],
        [-halfW, 0.8 + E],
        [halfW, 0.8 + E]
    ];
    legs.forEach(([x, z]) => {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.4, 6), legMat);
        leg.position.set(x, 0.2, z);
        leg.castShadow = true;
        group.add(leg);
    });

    // 2️⃣ Traverses avant / arrière (largeur d'origine : 1.2)
    const longSide = new THREE.Mesh(new THREE.BoxGeometry(1.2 + W, 0.08, 0.08), frameMat);
    longSide.position.set(0, 0.4, -0.8);
    longSide.castShadow = true;
    group.add(longSide);

    const longSide2 = new THREE.Mesh(new THREE.BoxGeometry(1.2 + W, 0.08, 0.08), frameMat);
    longSide2.position.set(0, 0.4, 0.8 + E);
    longSide2.castShadow = true;
    group.add(longSide2);

    // 3️⃣ Traverses latérales (longueur augmentée)
    const shortSide = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 1.6 + E), frameMat);
    shortSide.position.set(-halfW, 0.4, E / 2);
    shortSide.castShadow = true;
    group.add(shortSide);

    const shortSide2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 1.6 + E), frameMat);
    shortSide2.position.set(halfW, 0.4, E / 2);
    shortSide2.castShadow = true;
    group.add(shortSide2);

    // 4️⃣ Tête de lit (largeur d'origine : 1.2)
    const headMat = new THREE.MeshLambertMaterial({ color: 0xe0c0b0 });
    const head = new THREE.Mesh(new THREE.BoxGeometry(1.2 + W, 0.6, 0.08), headMat);
    head.position.set(0, 0.9, -0.85);
    head.castShadow = true;
    group.add(head);

    const paddingMat = new THREE.MeshLambertMaterial({ color: 0xf0d8c8 });
    const pad = new THREE.Mesh(new THREE.BoxGeometry(1.1 + W, 0.5, 0.06), paddingMat);
    pad.position.set(0, 0.9, -0.89);
    pad.castShadow = true;
    group.add(pad);

    const btnMat = new THREE.MeshLambertMaterial({ color: 0xc09080 });
    const btnSpacingX = (0.4 + W / 2) / 2;
    for (let i = -btnSpacingX; i <= btnSpacingX + 0.01; i += btnSpacingX) {
        for (let j = -0.15; j <= 0.15; j += 0.15) {
            const btn = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 4), btnMat);
            btn.position.set(i, 0.9 + j, -0.88);
            group.add(btn);
        }
    }

    // 5️⃣ Matelas (longueur augmentée, largeur d'origine)
    const mattressMat = new THREE.MeshLambertMaterial({ color: 0xf8f0e8 });
    const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.2 + W, 0.2, 1.6 + E), mattressMat);
    mattress.position.set(0, 0.5, E / 2);
    mattress.castShadow = true;
    mattress.receiveShadow = true;
    group.add(mattress);

    // 6️⃣ Oreiller (largeur d'origine)
    const pillowMat = new THREE.MeshLambertMaterial({ color: 0xf0e8e0 });
    const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.6 + W * 0.5, 0.12, 0.4), pillowMat);
    pillow.position.set(0, 0.7, -0.2);
    pillow.castShadow = true;
    pillow.receiveShadow = true;
    group.add(pillow);

    const pillowTop = new THREE.Mesh(new THREE.SphereGeometry(0.32, 10, 8), pillowMat);
    pillowTop.scale.set(0.9 + W * 0.4, 0.3, 0.7);
    pillowTop.position.set(0, 0.76, -0.2);
    pillowTop.castShadow = true;
    group.add(pillowTop);

    // 7️⃣ Couverture (longueur augmentée, largeur d'origine)
    const blanketMat = new THREE.MeshLambertMaterial({ map: blanketTex, color: 0xf0e0e0 });
    const blanket = new THREE.Mesh(new THREE.BoxGeometry(1.1 + W, 0.04, 1.1 + E), blanketMat);
    blanket.position.set(0, 0.62, 0.25 + E / 2);
    blanket.castShadow = true;
    blanket.receiveShadow = true;
    group.add(blanket);

    const foldMat = new THREE.MeshLambertMaterial({ map: blanketTex, color: 0xe8c8c8 });
    const fold = new THREE.Mesh(new THREE.BoxGeometry(1.1 + W, 0.04, 0.15), foldMat);
    fold.position.set(0, 0.63, 0.7 + E);
    fold.castShadow = true;
    group.add(fold);

    const edgeMat = new THREE.MeshLambertMaterial({ color: 0xd08090 });
    const edge = new THREE.Mesh(new THREE.BoxGeometry(1.1 + W, 0.02, 0.04), edgeMat);
    edge.position.set(0, 0.64, 0.7 + E);
    group.add(edge);

    // ── Positionnement final (TES VALEURS) ──
    group.position.set(-7, 0, -7.2);
    group.rotation.y = Math.PI / 2;
    scene.add(group);

    console.log(`🛏️ Lit allongé : +${E}m (longueur) – largeur inchangée (W=0) – posé à (-7, 0, -7.2)`);
}

// ─── Sélectionne automatiquement le bon chemin ───
function getJsonUrl() {
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return '/projet/Illusion/livres/mon_livre.json';
    }
    return 'https://raw.githubusercontent.com/pioupioucoder/BeYourDog/master/livres/mon_livre.json';
}
const JSON_URL = getJsonUrl();

let currentPage = 0;
let totalPages = 0;
let bookData = null;

// ─── Charger et afficher le livre ───
function chargerContenuLivre(container) {
    fetch(JSON_URL)
        .then(response => {
            if (!response.ok) throw new Error("Fichier JSON introuvable !");
            return response.json();
        })
        .then(data => {
            if (!data.pages || data.pages.length === 0) {
                data.pages = [{ numero: 1, contenu: "📖 Aucune page trouvée." }];
            }
            bookData = data;
            totalPages = data.pages.length;
            currentPage = 0;
            afficherLivre(container);
        })
        .catch(err => {
            container.innerHTML = `
                <p style="color:#e74c3c; text-align:center; font-size:18px;">
                    ❌ Livre introuvable.<br>
                    <span style="font-size:14px; color:#aaa;">${err.message}</span><br>
                    <code style="color:#f1c40f;">${JSON_URL}</code>
                </p>
            `;
            console.warn("Erreur de lecture du JSON :", err);
        });
}

// ─── Afficher le livre en double page ───

    container.innerHTML = '';

    // ─── Corps du livre (deux pages) ───
    const bookBody = document.createElement('div');
    bookBody.style.cssText = `
        display: flex;
        gap: 20px;
        width: 100%;
        flex: 1;
        min-height: 300px;
        background: #fcf9f6;
        border-radius: 8px;
        padding: 15px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.05);

    `;

    // Page de gauche

    // Séparateur central
    const separator = document.createElement('div');
    separator.style.cssText = `
        width: 2px;
        background: linear-gradient(to bottom, #d4c8b8, #b8a898, #d4c8b8);

        margin: 10px 0;
        box-shadow: -2px 0 8px rgba(0,0,0,0.05);
    `;
    bookBody.appendChild(separator);

    // Page de droite
    if (rightIndex < totalPages) {
        const rightPage = createPageElement(pages[rightIndex]);
        bookBody.appendChild(rightPage);
    } else {
        const emptyPage = document.createElement('div');
        emptyPage.style.cssText = `
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-style: italic;
            font-size: 16px;
            padding: 20px;
            background: #fcf9f6;
            border-radius: 4px;
        `;
        emptyPage.textContent = '✨ Fin du livre';
        bookBody.appendChild(emptyPage);
    }

    container.appendChild(bookBody);

    // ─── Navigation ───
    const nav = document.createElement('div');
    nav.style.cssText = `
        display: flex;
        gap: 15px;
        margin-top: 18px;
        align-items: center;
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
    `;

    const btnPrev = createNavButton('◀ Précédent', () => {
        if (currentPage > 0) {
            currentPage -= 2;
            if (currentPage < 0) currentPage = 0;
            afficherLivre(container);
        }
    }, currentPage > 0);

    const btnNext = createNavButton('Suivant ▶', () => {
        if (currentPage + 2 < totalPages) {
            currentPage += 2;
            afficherLivre(container);

    const progress = document.createElement('span');
    progress.textContent = `${currentPage + 1} – ${Math.min(currentPage + 2, totalPages)} / ${totalPages}`;
    progress.style.cssText = `

        color: #8a7a6a;
        padding: 4px 12px;
        background: #ede8e0;
        border-radius: 20px;

    nav.appendChild(btnPrev);

function createPageElement(page) {

// ─── Création d'un bouton de navigation ───
function createNavButton(label, onClick, enabled) {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.style.cssText = `
        padding: 8px 18px;
        border: none;
        border-radius: 24px;
        background: ${enabled ? '#8a7a6a' : '#ccc'};
        color: white;
        font-family: 'Georgia', serif;
        font-size: 14px;
        cursor: ${enabled ? 'pointer' : 'default'};
        transition: 0.2s;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    `;
    if (enabled) {
        btn.onmouseover = () => { btn.style.background = '#6a5a4a'; };
        btn.onmouseout = () => { btn.style.background = '#8a7a6a'; };
        btn.onclick = onClick;
    } else {
        btn.style.opacity = '0.5';
    }
    return btn;
}

// ─── 2. Variable globale pour le livre ───
let monLivre = null;

// ─── 3. Fonction pour placer le livre sur la bibliothèque ───
function ajouterLivreSurBibliotheque() {
    if (monLivre) return;

    // Recherche de la bibliothèque et de ses étagères
    let bibliotheque = null;
    let hauteurEtagere = 0.95;

    scene.children.forEach((child) => {
        if (child.userData && Array.isArray(child.userData.etageres)) {
            bibliotheque = child;
            const etageres = child.userData.etageres;
            if (etageres.length > 2) {
                hauteurEtagere = etageres[2] + 0.02;
            } else if (etageres.length > 0) {
                hauteurEtagere = etageres[0] + 0.02;
            }
        }
    });

    if (!bibliotheque) {
        console.warn('📚 Bibliothèque non trouvée, le livre sera ajouté à la scène.');
    }

    // Créer le livre
    const livre = creerLivre3D();
    monLivre = livre;

    // Position dans le repère de la bibliothèque (ou de la scène)
    livre.position.set(0.6, hauteurEtagere, 0.0);
    livre.rotation.y = 0;

    if (bibliotheque) {
        bibliotheque.add(livre);
        console.log(`📖 Livre placé sur l'étagère à Y=${hauteurEtagere}`);
    } else {
        scene.add(livre);
        console.warn('📖 Livre ajouté à la scène (bibliothèque introuvable)');
    }

    // ─── 4. Interactions (survol + clic) ───
    const canvas = document.getElementById('gc');
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let livreSurvole = false;

    function onMouseMove(event) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects([livre], true);

        if (intersects.length > 0) {
            if (!livreSurvole) {
                livreSurvole = true;
                livre.userData.couvMat.color.setHex(livre.userData.couleurSurvol);
                canvas.style.cursor = 'pointer';
            }
        } else {
            if (livreSurvole) {
                livreSurvole = false;
                livre.userData.couvMat.color.setHex(livre.userData.couleurOriginale);
                canvas.style.cursor = 'crosshair';
            }
        }
    }

    function onMouseClick(event) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects([livre], true);

        if (intersects.length > 0) {
            ouvrirLivre();
            event.stopPropagation();
        }
    }

    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onMouseClick);

    window._cleanupLivre = function () {
        canvas.removeEventListener('mousemove', onMouseMove);
        canvas.removeEventListener('click', onMouseClick);
    };
}

function createBookshelf() {

    const height = 2.4;
    const depth = 0.5;
    const shelfThick = 0.05;
    const legThick = 0.06;

    // ── Matériaux ──
    const woodMat = new THREE.MeshStandardMaterial({
        color: 0xd4b090,
        roughness: 0.4,
        metalness: 0.1,
    });
    const metalMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a2a,
        roughness: 0.3,
        metalness: 0.8,
    });
    const darkWoodMat = new THREE.MeshStandardMaterial({
        color: 0x8a6e4b,
        roughness: 0.5,
        metalness: 0.1,
    });

    // ── Montants ──
    const legPositions = [
        [-width/2 + 0.06, -depth/2 + 0.06],
        [width/2 - 0.06, -depth/2 + 0.06],
        [-width/2 + 0.06, depth/2 - 0.06],
        [width/2 - 0.06, depth/2 - 0.06]
    ];
    legPositions.forEach(([x, z]) => {
        const leg = new THREE.Mesh(
            new THREE.BoxGeometry(legThick, height, legThick),
            metalMat
        );
        leg.position.set(x, height/2, z);
        leg.castShadow = true;
        leg.receiveShadow = true;
        group.add(leg);
    });

    // ── ÉTAGÈRES (AVEC STOCKAGE DES HAUTEURS) ──
    const nbShelves = 6;
    const spacing = height / (nbShelves + 1);
    const etageres = []; // ← TABLEAU POUR STOCKER LES HAUTEURS

    for (let i = 1; i <= nbShelves; i++) {
        const yPos = i * spacing - 0.05;
        etageres.push(yPos); // ← ON STOCKE

        const mat = (i % 2 === 0) ? woodMat : darkWoodMat;
        const shelf = new THREE.Mesh(
            new THREE.BoxGeometry(width - 0.04, shelfThick, depth - 0.04),

        );
        shelf.position.set(0, yPos, 0);

        shelf.receiveShadow = true;
        group.add(shelf);
    }

    // ── Plateau supérieur ──
    const top = new THREE.Mesh(
        new THREE.BoxGeometry(width + 0.02, 0.05, depth + 0.02),
        woodMat
    );
    top.position.set(0, height, 0);
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);

    // ── Plinthe ──
    const base = new THREE.Mesh(

        metalMat
    );
    base.position.set(0, 0.02, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);

    //  ON ATTACHE LES HAUTEURS AU GROUPE
    // ════════════════════════════════════════════════════
    group.userData.etageres = etageres;

    // ── Positionnement final ──
    group.position.set(7.7, 0, -5);
    group.rotation.y = Math.PI / 2;
    scene.add(group);

    console.log('📚 Bibliothèque avec étagères enregistrées');
}

// Fonction de fallback (identique)
function generateFallbackTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 256, 256);
    grad.addColorStop(0, '#8a7a5a');
    grad.addColorStop(1, '#5a4a2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 256, 256);
    ctx.strokeStyle = '#d4a840';
    ctx.lineWidth = 12;
    ctx.strokeRect(20, 20, 216, 216);
    ctx.fillStyle = '#d4a840';
    ctx.font = '80px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎨', 128, 130);
    return new THREE.CanvasTexture(canvas);
}

// Fonction qui crée un cadre avec image (identique à corridor.html)
function makePictureFrame(z, facingRight, imageIndex) {
    const frameW = 0.8;
    const frameH = 1.0;
    const borderW = 0.02;
    const depth = 0.12;

    const group = new THREE.Group();
    const wallX = facingRight ? ROOM_W / 2 - 0.02 : -ROOM_W / 2 + 0.02;
    const offsetX = facingRight ? -0.1 : 0.1;
    group.position.set(wallX + offsetX, 1.7, z);
    group.rotation.y = facingRight ? -Math.PI / 2 : Math.PI / 2;

    // Plan de l'image
    const imgMat = new THREE.MeshLambertMaterial({
        color: 0xffffff,
        polygonOffset: true,
        polygonOffsetFactor: -1,
        polygonOffsetUnits: -1
    });
    const imageMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(frameW - borderW * 2.4, frameH - borderW * 2.4),
        imgMat
    );
    imageMesh.position.set(0, 0, depth * 0.2);
    group.add(imageMesh);

    // Chargement de l'image
    const imgUrl = 'images/corridor' + imageIndex + '.png';
    const loader = new THREE.TextureLoader();
    loader.load(imgUrl,
        function(tex) {
            imageMesh.material = new THREE.MeshLambertMaterial({
                map: tex,
                polygonOffset: true,
                polygonOffsetFactor: -1,
                polygonOffsetUnits: -1
            });
            imageMesh.material.needsUpdate = true;
        },
        undefined,
        function() {
            // Fallback vers .jpg puis .webp
            const fallbacks = ['images/corridor' + imageIndex + '.jpg', 'images/corridor' + imageIndex + '.webp'];
            let tried = 0;

            function tryFallback() {
                if (tried >= fallbacks.length) {
                    imageMesh.material = new THREE.MeshLambertMaterial({
                        map: generateFallbackTexture(),
                        polygonOffset: true,
                        polygonOffsetFactor: -1,
                        polygonOffsetUnits: -1
                    });
                    return;
                }
                const fLoader = new THREE.TextureLoader();
                fLoader.load(fallbacks[tried],
                    function(tex) {
                        imageMesh.material = new THREE.MeshLambertMaterial({
                            map: tex,
                            polygonOffset: true,
                            polygonOffsetFactor: -1,
                            polygonOffsetUnits: -1
                        });
                        imageMesh.material.needsUpdate = true;
                    },
                    undefined,
                    function() {
                        tried++;
                        tryFallback();
                    }
                );
            }
            tryFallback();
        }
    );

    // Bordure du cadre (4 baguettes)
    const bMat = new THREE.MeshLambertMaterial({ color: 0xb89040, emissive: 0x2a1a00, emissiveIntensity: 0.15 });
    const top = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.04, borderW, depth * 0.8), bMat);
    top.position.set(0, frameH / 2 - borderW / 2, 0);
    group.add(top);
    const bot = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.04, borderW, depth * 0.8), bMat);
    bot.position.set(0, -frameH / 2 + borderW / 2, 0);
    group.add(bot);
    const left = new THREE.Mesh(new THREE.BoxGeometry(borderW, frameH - borderW * 2, depth * 0.8), bMat);
    left.position.set(-frameW / 2 + borderW / 2, 0, 0);
    group.add(left);
    const right = new THREE.Mesh(new THREE.BoxGeometry(borderW, frameH - borderW * 2, depth * 0.8), bMat);
    right.position.set(frameW / 2 - borderW / 2, 0, 0);
    group.add(right);

    // Ornements d'angle
    const dotMat = new THREE.MeshLambertMaterial({ color: 0xd4a840, emissive: 0x3a2600, emissiveIntensity: 0.2 });
    const corners = [
        [-frameW / 2 + borderW * 0.6, frameH / 2 - borderW * 0.6],
        [frameW / 2 - borderW * 0.6, frameH / 2 - borderW * 0.6],
        [-frameW / 2 + borderW * 0.6, -frameH / 2 + borderW * 0.6],
        [frameW / 2 - borderW * 0.6, -frameH / 2 + borderW * 0.6]
    ];
    corners.forEach(function(p) {
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 4), dotMat);
        dot.position.set(p[0], p[1], depth * 0.5);
        group.add(dot);
    });

    scene.add(group);
}

                const mg = Math.sqrt(dx * dx + dy * dy);
                if (mg > 1) { dx /= mg;
                    dy /= mg; }
                onMove(dx, dy);
            }

            function e() { active = false;
                onMove(0, 0); }
            cv.addEventListener('mousedown', function(ev) { const r = cv.getBoundingClientRect();
                s(ev.clientX - r.left, ev.clientY - r.top); });
            document.addEventListener('mousemove', function(ev) { if (active) { const r = cv.getBoundingClientRect();
                    mv(ev.clientX - r.left, ev.clientY - r.top); } });
            document.addEventListener('mouseup', e);
            cv.addEventListener('touchstart', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                s(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchmove', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                mv(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchend', e);
        }
        setupJoy('jL', function(dx, dy) { jLx = dx;
            jLy = dy; });
        setupJoy('jR', function(dx, dy) { jRx = dx;
            jRy = dy; });

        function drawJoy(id, dx, dy) {
            const cv = document.getElementById(id);
            const x2 = cv.getContext('2d');
            const W = 120,
                H = 60;
            x2.clearRect(0, 0, W, H);
            x2.fillStyle = '#1e1e1e';
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#444';
            x2.lineWidth = 1.5;
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.stroke();
            const nx = W / 2 + dx * 38,
                ny = H / 2 + dy * 16;
            const g2 = x2.createRadialGradient(nx - 2, ny - 2, 1, nx, ny, 13);
            g2.addColorStop(0, '#888');
            g2.addColorStop(1, '#2a2a2a');
            x2.fillStyle = g2;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#111';
            x2.lineWidth = 1;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.stroke();
        }

       // ─── Boutons ──────────────────────────────────────────────────────
let showCoords = false;

function toggleCoords() {
    showCoords = !showCoords;
    document.getElementById('coordPanel').style.display = showCoords ? 'block' : 'none';
    document.getElementById('btnCoords').classList.toggle('active', showCoords);
}

function copyCoords() {
    var x = camera.position.x.toFixed(2),
        y = camera.position.y.toFixed(2),
        z = camera.position.z.toFixed(2);
    var txt = 'X:' + x + ' Y:' + y + ' Z:' + z;

    function updateButton() {
        var btn = document.getElementById('copyBtn');
        btn.textContent = '✓ COPIED!';
        btn.classList.add('copied');
        setTimeout(function() {
            btn.textContent = '⧉ COPY';
            btn.classList.remove('copied');
        }, 2000);
    }

    if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(updateButton).catch(function() {
            var el = document.createElement('textarea');
            el.value = txt;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            updateButton();
        });
    } else {
        var el = document.createElement('textarea');
        el.value = txt;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        updateButton();
    }
}

function updateCoordDisplay() {
    if (!showCoords) return;
    document.getElementById('cx').textContent = camera.position.x.toFixed(2);
    document.getElementById('cz').textContent = camera.position.z.toFixed(2);
    document.getElementById('cy').textContent = camera.position.y.toFixed(2);
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ─── Boucle ──────────────────────────────────────────────────────
var lastTime = 0;
var SPEED = 4.5;

function loop(time) {
    var dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    var fx = 0, fz = 0;
    if (keys['z'] || keys['arrowup']) fz = 1;
    if (keys['s'] || keys['arrowdown']) fz = -1;
    if (keys['q'] || keys['arrowleft']) fx = -1;
    if (keys['d'] || keys['arrowright']) fx = 1;
    fx += jLx;
    fz -= jLy;

    if (jRx !== 0) camYaw -= jRx * 0.12;

    // Gestion du regard (Pitch) - sans le mode vol
    if (jRy !== 0) {
        camPitch += jRy * 2 * dt;
        camPitch = Math.max(-0.5, Math.min(0.6, camPitch));
    }
    camera.position.y = 1.7;

    var cos = Math.cos(camYaw), sin = Math.sin(camYaw);
    camera.position.x += (-fx * cos + fz * sin) * SPEED * dt;
    camera.position.z += (fx * sin + fz * cos) * SPEED * dt;
  
// ─── COLLISION MUR CENTRAL + VANTAIL DE PORTE ──────────────
const limits = window._midWallLimits;
if (limits) {
    const halfWall = limits.thickness / 2 + 0.1;
    const inXRange = camera.position.x >= limits.minX && camera.position.x <= limits.maxX;
    const inDoorX = camera.position.x >= limits.doorMinX && camera.position.x <= limits.doorMaxX;
    const isDoorOpen = window._midDoorOpen || false;

    // 1. Collision avec le mur (bloque SAUF si porte ouverte)
    if (inXRange) {
        const canPass = inDoorX && isDoorOpen;
        if (!canPass) {
            if (camera.position.z > -halfWall && camera.position.z < halfWall) {
                if (camera.position.z > 0) camera.position.z = halfWall;
                else camera.position.z = -halfWall;
            }
        }
    }

    // 2. Collision avec le vantail de la porte (toujours active)
    const doorGroup = window._midDoorGroup;
    if (doorGroup) {
        const worldPos = new THREE.Vector3();
        doorGroup.getWorldPosition(worldPos);
        const worldQuat = new THREE.Quaternion();
        doorGroup.getWorldQuaternion(worldQuat);

        const halfW = 0.6;   // doorW/2
        const halfH = 1.1;   // doorH/2
        const halfD = 0.05;  // épaisseur

        const localPos = camera.position.clone().sub(worldPos);
        localPos.applyQuaternion(worldQuat.clone().invert());

        const margin = 0.15;
        if (Math.abs(localPos.x) < halfW + margin &&
            Math.abs(localPos.y) < halfH + margin &&
            Math.abs(localPos.z) < halfD + margin) {
            const overlapX = halfW + margin - Math.abs(localPos.x);
            const overlapY = halfH + margin - Math.abs(localPos.y);
            const overlapZ = halfD + margin - Math.abs(localPos.z);

            if (overlapX < overlapY && overlapX < overlapZ) {
                const sign = Math.sign(localPos.x) || 1;
                localPos.x = sign * (halfW + margin);
            } else if (overlapY < overlapX && overlapY < overlapZ) {
                const sign = Math.sign(localPos.y) || 1;
                localPos.y = sign * (halfH + margin);
            } else {
                const sign = Math.sign(localPos.z) || 1;
                localPos.z = sign * (halfD + margin);
            }

            localPos.applyQuaternion(worldQuat);
            camera.position.copy(worldPos.clone().add(localPos));
        }
    }
}
var margin = 0.8;
    var margin = 0.8;
    camera.position.x = Math.max(-ROOM_W / 2 + margin, Math.min(ROOM_W / 2 - margin, camera.position.x));
    camera.position.z = Math.max(-ROOM_D / 2 + margin, Math.min(ROOM_D / 2 - margin, camera.position.z));

    updateCoordDisplay();

    var dir = new THREE.Vector3(
        Math.sin(camYaw) * Math.cos(camPitch),
        -Math.sin(camPitch),
        Math.cos(camYaw) * Math.cos(camPitch)
    );
    camera.lookAt(camera.position.x + dir.x, camera.position.y + dir.y, camera.position.z + dir.z);

    renderer.render(scene, camera);
    drawJoy('jL', jLx, jLy);
    drawJoy('jR', jRx, jRy);
    requestAnimationFrame(loop);
}

window.addEventListener('resize', function() {
    var w = window.innerWidth,
        h = window.innerHeight - 70;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

requestAnimationFrame(loop);
